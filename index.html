<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok Tappers</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="game-container">
        <h1>Grok Tappers</h1>
        <p>Монеты: <span id="coins">0</span></p>
        <p>Уровень: <span id="level">1</span></p>
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
        <div id="tap-area">ТАПАЙ ЗДЕСЬ!</div>
        <button id="boost-button">Бустер (+1/сек за 100 монет)</button>
        <p>Авто: <span id="auto-rate">0</span>/сек</p>
        <button id="daily-reward">Ежедневка</button>
        <button id="invite-button">Пригласить (+50)</button>
        <button id="share-progress">Шарить прогресс</button>
        <button id="leaderboard-button">Лидерборд</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
